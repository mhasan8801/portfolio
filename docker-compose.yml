services:

  portfolio:

    build: .

    container_name: portfolio

    restart: unless-stopped

    networks:
      - proxy

    labels:
      - traefik.enable=true

      - traefik.http.routers.portfolio.rule=Host(`mhasan.my.id`)

      - traefik.http.services.portfolio.loadbalancer.server.port=3000

networks:
  proxy:
    external: true