<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" fill="none">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0f1e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a1f2e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00ffaa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00d4ff;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="400" fill="url(#bg)"/>
  
  <!-- Grid Pattern -->
  <g opacity="0.1" stroke="url(#accent)" stroke-width="1">
    <line x1="0" y1="100" x2="800" y2="100"/>
    <line x1="0" y1="200" x2="800" y2="200"/>
    <line x1="0" y1="300" x2="800" y2="300"/>
    <line x1="200" y1="0" x2="200" y2="400"/>
    <line x1="400" y1="0" x2="400" y2="400"/>
    <line x1="600" y1="0" x2="600" y2="400"/>
  </g>
  
  <!-- Test Automation Icon -->
  <g transform="translate(250, 80)">
    <!-- Code Brackets -->
    <path d="M 40 60 L 10 90 L 40 120" stroke="url(#accent)" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <path d="M 110 60 L 140 90 L 110 120" stroke="url(#accent)" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    
    <!-- Bug Icon -->
    <circle cx="75" cy="90" r="25" fill="none" stroke="#00ffaa" stroke-width="3" opacity="0.8"/>
    <line x1="75" y1="65" x2="75" y2="75" stroke="#00ffaa" stroke-width="3" stroke-linecap="round"/>
    <line x1="60" y1="80" x2="68" y2="85" stroke="#00ffaa" stroke-width="3" stroke-linecap="round"/>
    <line x1="90" y1="80" x2="82" y2="85" stroke="#00ffaa" stroke-width="3" stroke-linecap="round"/>
    
    <!-- Checkmark -->
    <path d="M 170 85 L 185 100 L 210 70" stroke="#00d4ff" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.9"/>
  </g>
  
  <!-- Terminal Lines -->
  <g transform="translate(200, 220)" opacity="0.6">
    <rect x="0" y="0" width="400" height="100" rx="8" fill="rgba(0, 255, 170, 0.05)" stroke="url(#accent)" stroke-width="2"/>
    <line x1="20" y1="25" x2="180" y2="25" stroke="#00ffaa" stroke-width="3" stroke-linecap="round"/>
    <line x1="20" y1="50" x2="240" y2="50" stroke="#00d4ff" stroke-width="3" stroke-linecap="round"/>
    <line x1="20" y1="75" x2="140" y2="75" stroke="#00ffaa" stroke-width="3" stroke-linecap="round"/>
    <circle cx="350" cy="25" r="8" fill="#00ffaa"/>
    <circle cx="350" cy="50" r="8" fill="#00d4ff"/>
    <circle cx="350" cy="75" r="8" fill="#00ffaa"/>
  </g>
  
  <!-- Decorative Elements -->
  <circle cx="100" cy="80" r="3" fill="#00ffaa" opacity="0.5"/>
  <circle cx="700" cy="100" r="3" fill="#00d4ff" opacity="0.5"/>
  <circle cx="650" cy="320" r="3" fill="#00ffaa" opacity="0.5"/>
  <circle cx="150" cy="350" r="3" fill="#00d4ff" opacity="0.5"/>
</svg>
